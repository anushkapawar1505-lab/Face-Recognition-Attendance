<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Register Student Face</title>
<script defer src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>

<style>
body { margin:0; padding:0; font-family:Arial; background:#eef2f7; display:flex; justify-content:center; align-items:center; min-height:100vh; }

.container {
    background:#fff;
    padding:30px 40px;
    border-radius:15px;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
    text-align:center;
    width:400px;
}

h2 { color:#2f80ed; margin-bottom:20px; }

input {
    width:80%;
    padding:10px;
    margin:8px 0;
    border-radius:6px;
    border:1px solid #ccc;
    font-size:15px;
}

button {
    background:#2f80ed;
    color:#fff;
    border:none;
    padding:10px 18px;
    border-radius:8px;
    margin:5px;
    cursor:pointer;
}

button:hover { background:#1864c0; }

.video-container {
    position:relative;
    width:100%;
    height:250px;
    border-radius:12px;
    border:4px solid #2f80ed;
    margin-top:15px;
    overflow:hidden;
}

video {
    width:100%;
    height:100%;
}

#scanLine {
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:3px;
    background:limegreen;
    box-shadow:0 0 12px limegreen;
    animation: scanDown 2s linear infinite;
    display:none;
}

@keyframes scanDown {
    0% { top:0%; }
    100% { top:100%; }
}

#msg {
    margin-top:15px;
    font-weight:bold;
    min-height:25px;
}

.success { color:green; }
.error { color:red; }

/* 🔥 TOAST */
#toast{
    position: fixed;
    bottom: 25px;
    right: 25px;
    min-width: 250px;
    background: #28a745;
    color: #fff;
    padding: 14px 20px;
    border-radius: 10px;
    font-weight: 500;
    box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    opacity: 0;
    transform: translateY(50px);
    transition: all 0.4s ease;
    z-index: 9999;
}
#toast.show{
    opacity: 1;
    transform: translateY(0);
}

</style>
</head>

<body>

<div class="container">
    <h2>Register Student Face</h2>

    <input type="text" id="studentRoll" placeholder="Enter Roll"><br>
    <input type="text" id="studentName" placeholder="Enter Name"><br>

    <button onclick="startRegister()">Start Scan</button>
    <button onclick="stopCamera()">Stop Camera</button>
    <button onclick="goBack()">Back</button>

    <div class="video-container">
        <video id="video" autoplay muted></video>
        <div id="scanLine"></div>
    </div>

    <p id="msg"></p>
</div>

<!-- 🔥 TOAST -->
<div id="toast"></div>

<script>
const video = document.getElementById("video");
const msg = document.getElementById("msg");
const scanLine = document.getElementById("scanLine");

let modelsLoaded = false;
let currentStream = null;

// 🔥 TOAST FUNCTION
function showToast(message){
    const toast = document.getElementById("toast");
    toast.innerText = message;
    toast.classList.add("show");

    setTimeout(()=>{
        toast.classList.remove("show");
    }, 2500);
}

// LOAD MODELS
async function loadModelsOnce(){
    if(modelsLoaded) return true;
    try{
        await faceapi.nets.tinyFaceDetector.loadFromUri('./models');
        await faceapi.nets.faceLandmark68Net.loadFromUri('./models');
        await faceapi.nets.faceRecognitionNet.loadFromUri('./models');
        modelsLoaded = true;
        msg.innerText = "Models Loaded ✅";
        msg.className="success";
        return true;
    }catch{
        msg.innerText = "Model Load Error ❌";
        msg.className="error";
        return false;
    }
}

// START CAMERA
async function startCamera(){
    try{
        currentStream = await navigator.mediaDevices.getUserMedia({ video:true });
        video.srcObject = currentStream;

        await new Promise(resolve => {
            video.onloadedmetadata = ()=>{
                video.play();
                resolve();
            };
        });

        return true;
    }catch{
        msg.innerText="Camera Error ❌";
        msg.className="error";
        return false;
    }
}

// STOP CAMERA
function stopCamera(){
    if(currentStream){
        currentStream.getTracks().forEach(track=>track.stop());
        currentStream=null;
        msg.innerText="Camera Stopped ⛔";
        msg.className="error";
        stopScanLine();
    }
}

// BACK
function goBack(){
    window.history.back();
}

// SCAN LINE
function startScanLine(){ scanLine.style.display = "block"; }
function stopScanLine(){ scanLine.style.display = "none"; }

// MAIN REGISTER
async function startRegister(){

    const ok = await loadModelsOnce();
    if(!ok) return;

    const roll = document.getElementById("studentRoll").value.trim();
    const name = document.getElementById("studentName").value.trim();

    if(!roll || !name){
        showToast("Enter Roll & Name ⚠️");
        return;
    }

    let students = JSON.parse(localStorage.getItem("students")) || [];
    let existingIndex = students.findIndex(s => s.roll == roll);

    const cam = await startCamera();
    if(!cam) return;

    msg.innerText="Scanning Face...";
    msg.className="success";

    startScanLine();

    await new Promise(r=>setTimeout(r,1500));

    const detection = await faceapi
        .detectSingleFace(video,new faceapi.TinyFaceDetectorOptions())
        .withFaceLandmarks()
        .withFaceDescriptor();

    stopScanLine();

    if(!detection){
        msg.innerText="Face Not Detected ❌";
        msg.className="error";
        stopCamera();
        return;
    }

    const descriptor = Array.from(detection.descriptor);

    if(existingIndex !== -1){
        students[existingIndex].descriptor = descriptor;
        students[existingIndex].name = name;
        msg.innerText = "Face Updated ✅";
        showToast("Face Updated Successfully ✅");
    } else {
        students.push({ roll, name, descriptor });
        msg.innerText = "Student Registered ✅";
        showToast("Student Registered Successfully 🎉");
    }

    localStorage.setItem("students", JSON.stringify(students));

    msg.className="success";

    stopCamera();

    document.getElementById("studentRoll").value = "";
    document.getElementById("studentName").value = "";
}
</script>

</body>
</html>
