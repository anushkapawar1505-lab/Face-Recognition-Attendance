<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login</title>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial,sans-serif;
}

html, body{
  height:100%;
}

/* BACKGROUND */
body{
  display:flex;
  justify-content:center;
  align-items:center;
  position:relative;

  background: url("images/bg.jpeg") no-repeat center center fixed;
  background-size: cover;
}

/*  0.3 OVERLAY (FINAL FIX) */
body::before{
  content:"";
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background: rgba(0,0,0,0.3); /* FINAL */
  z-index:0;
}

/* LOGIN BOX */
.login-box{
  width:400px;
  padding:50px 40px;
  border-radius:20px;
  
  background:rgba(255,255,255,0.12);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);

  border:1px solid rgba(255,255,255,0.25);
  box-shadow:0 10px 40px rgba(0,0,0,0.5);

  color:white;
  text-align:center;

  transition:0.4s;
  position:relative;
  z-index:1;
}

.login-box:hover{
  transform:translateY(-5px);
  box-shadow:0 15px 50px rgba(0,0,0,0.7);
}

/* TITLE */
.login-box h2{
  margin-bottom:30px;
  font-size:30px;
  font-weight:600;
  letter-spacing:1px;
}

/* INPUTS */
.login-box input{
  width:100%;
  padding:14px;
  margin:15px 0;
  border:none;
  border-radius:10px;
  outline:none;
  background:rgba(255,255,255,0.25); /* thoda improve visibility */
  color:white;
  font-size:15px;
}

.login-box input::placeholder{
  color:#eee;
}

/* BUTTON */
.login-box button{
  width:100%;
  padding:14px;
  margin-top:20px;
  border:none;
  border-radius:10px;
  background:linear-gradient(45deg,#0072ff,#00c6ff);
  color:white;
  cursor:pointer;
  font-weight:bold;
  font-size:16px;
  transition:0.3s;
}

.login-box button:hover{
  opacity:0.9;
  transform:scale(1.02);
}

/* MOBILE FIX */
@media(max-width:500px){
  .login-box{
    width:90%;
    padding:30px 20px;
  }
}
</style>

</head>

<body>

<div class="login-box">
  <h2>Admin Login</h2>

  <input type="text" id="username" placeholder="Admin Name">
  <input type="password" id="password" placeholder="Password">

  <button onclick="login()">Login</button>
</div>

<script>
if(!localStorage.getItem("adminName")) localStorage.setItem("adminName","admin");
if(!localStorage.getItem("adminPassword")) localStorage.setItem("adminPassword","1234");

function login(){
    let username = document.getElementById("username").value.trim();
    let password = document.getElementById("password").value.trim();

    let savedName = localStorage.getItem("adminName");
    let savedPass = localStorage.getItem("adminPassword");

    if(username === savedName && password === savedPass){
        localStorage.setItem("adminLoggedIn","true");

        Swal.fire({
          icon: 'success',
          title: 'Login Successful',
          text: 'Welcome Admin!',
          timer: 1500,
          showConfirmButton: false
        });

        setTimeout(()=>{
          window.location.href="dashboard.html";
        },1500);

    } else {
        Swal.fire({
          icon: 'error',
          title: 'Login Failed',
          text: 'Wrong Username or Password',
          confirmButtonColor: '#0072ff'
        });
    }
}
</script>

</body>
</html>
