<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial,sans-serif;
}

html, body{
  height:100%;
}

body{
  display:flex;
  justify-content:center;
  align-items:center;

  /* ✅ FIXED MOBILE BACKGROUND */
  background: url("images/bg.jpeg") no-repeat center center;
  background-size: cover;
}

/* GLASS RECTANGLE BOX */
.login-box{
  width:400px;
  padding:50px 40px;
  border-radius:20px;
  
  background:rgba(255,255,255,0.12);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);

  border:1px solid rgba(255,255,255,0.25);
  box-shadow:0 10px 40px rgba(0,0,0,0.5);

  color:white;
  text-align:center;

  transition:0.4s;
}

.login-box:hover{
  transform:translateY(-5px);
  box-shadow:0 15px 50px rgba(0,0,0,0.7);
}

.login-box h2{
  margin-bottom:30px;
  font-size:30px;
  letter-spacing:1px;
}

/* INPUTS */
.login-box input{
  width:100%;
  padding:14px;
  margin:12px 0;

  border:none;
  border-radius:10px;
  outline:none;

  background:rgba(255,255,255,0.2);
  color:white;
  font-size:15px;

  transition:0.3s;
}

.login-box input::placeholder{
  color:#ddd;
}

.login-box input:focus{
  background:rgba(255,255,255,0.3);
}

/* BUTTON */
.login-box button{
  width:100%;
  padding:14px;
  margin-top:20px;

  border:none;
  border-radius:10px;

  background:linear-gradient(45deg,#0072ff,#00c6ff);
  color:white;

  cursor:pointer;
  font-weight:bold;
  font-size:16px;

  transition:0.3s;
}

.login-box button:hover{
  transform:scale(1.05);
  background:linear-gradient(45deg,#0059c9,#0094cc);
}
</style>

</head>

<body>

<div class="login-box">
  <h2>Admin Login</h2>

  <input type="text" id="username" placeholder="Admin Name">
  <input type="password" id="password" placeholder="Password">

  <button onclick="login()">Login</button>
</div>

<script>
// Default credentials
if(!localStorage.getItem("adminName")) localStorage.setItem("adminName","admin");
if(!localStorage.getItem("adminPassword")) localStorage.setItem("adminPassword","1234");

function login(){
    let username = document.getElementById("username").value.trim();
    let password = document.getElementById("password").value.trim();

    let savedName = localStorage.getItem("adminName");
    let savedPass = localStorage.getItem("adminPassword");

    if(username === savedName && password === savedPass){
        localStorage.setItem("adminLoggedIn","true");
        window.location.href="dashboard.html";
    } else {
        alert("Wrong Username or Password");
    }
}
</script>

</body>
</html>
