<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Add Student | Smart Attendance</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

<style>
body {
    font-family: 'Roboto', sans-serif;
    background: #f4f6f9;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px;
}

h2 {
    color: #0f1b4c;
    margin-bottom: 25px;
}

input[type="text"] {
    width: 280px;
    padding: 12px;
    margin: 10px 0;
    border-radius: 8px;
    border: 1px solid #ccc;
    font-size: 16px;
}

.button-row {
    margin-top: 15px;
}

button {
    padding: 12px 25px;
    margin: 10px 5px;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    font-weight: 500;
    cursor: pointer;
    transition: transform 0.2s, background 0.2s;
}

button:hover {
    transform: translateY(-2px);
}

#addBtn {
    background: #1e90ff;
    color: #fff;
}

.back-btn {
    position: fixed;
    bottom: 20px;
    right: 20px;
    padding: 10px 15px;
    background: #1e90ff;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    transition: background 0.2s, transform 0.2s;
}

.back-btn:hover {
    background: #187bcd;
    transform: translateY(-2px);
}

#msg {
    margin-top: 20px;
    font-weight: 500;
    font-size: 18px;
    color: #0f1b4c;
}
</style>
</head>

<body>

<h2>Add Student</h2>

<input type="text" id="roll" placeholder="Enter Roll">
<br>
<input type="text" id="name" placeholder="Enter Name">
<br>

<div class="button-row">
    <button id="addBtn" onclick="addStudent()">Add Student</button>
</div>

<div id="msg"></div>

<button class="back-btn" onclick="goBack()">⬅ Back</button>

<script>
function addStudent(){
    let roll = document.getElementById("roll").value.trim();
    let name = document.getElementById("name").value.trim();
    let msg = document.getElementById("msg");

    msg.innerText = "";

    // Validation
    if(!roll || !name){
        msg.innerText = "⚠️ Enter both Roll and Name";
        return;
    }

    let students = JSON.parse(localStorage.getItem("students")) || [];

    // Prevent duplicate roll (loose compare for safety)
    if(students.some(s => s.roll == roll)){
        msg.innerText = "⚠️ Roll number already exists!";
        return;
    }

    // Save student (FIXED structure - consistent everywhere)
    students.push({
        roll: roll,
        name: name
    });

    localStorage.setItem("students", JSON.stringify(students));

    msg.innerText = "✅ Student Added Successfully";

    // Clear inputs
    document.getElementById("roll").value = "";
    document.getElementById("name").value = "";

    // Redirect
    setTimeout(()=>{
        window.location.href = "dashboard.html";
    },1000);
}

function goBack(){
    window.location.href = "dashboard.html";
}
</script>

</body>
</html>
